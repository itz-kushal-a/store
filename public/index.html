<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Rank Store</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>⚔️ Minecraft Server Rank Store</h1>
        <p>Support the server and unlock powerful in-game perks instantly.</p>
      </header>

      <section>
        <h2>Available Ranks</h2>
        <div id="rank-list" class="rank-grid" aria-live="polite"></div>
      </section>

      <section class="checkout-box">
        <h2>Checkout</h2>
        <form id="checkout-form">
          <label>
            Minecraft Username
            <input type="text" id="playerName" name="playerName" placeholder="Notch" required />
          </label>

          <label>
            Email
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </label>

          <label>
            Selected Rank
            <select id="rankId" name="rankId" required></select>
          </label>

          <button type="submit">Pay with Card</button>
        </form>

        <p id="status" class="status"></p>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
